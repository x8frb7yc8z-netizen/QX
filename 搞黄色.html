<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sticky Sync - 极简收藏</title>
    <style>
        :root {
            --primary-clr: #007aff;
            --bg-clr: #f2f2f7;
            --card-bg: #ffffff;
            --text-main: #1c1c1e;
            --text-sec: #8e8e93;
            --comment-clr: #636366;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-clr);
            font-family: -apple-system, system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* 顶部输入区 */
        .header-input {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 15px 15px 10px 15px;
            border-bottom: 1px solid #d1d1d6;
            z-index: 100;
            flex-shrink: 0;
        }

        #mainInput {
            width: 100%;
            height: 100px;
            padding: 12px;
            border: 1px solid #d1d1d6;
            border-radius: 12px;
            font-size: 16px;
            resize: none;
            outline: none;
            background: #fff;
            transition: border-color 0.2s;
        }

        #mainInput:focus { border-color: var(--primary-clr); }

        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }

        .id-label { font-size: 11px; color: var(--text-sec); font-family: monospace; }

        .save-btn {
            background: var(--primary-clr);
            color: white;
            border: none;
            padding: 8px 24px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(0,122,255,0.2);
        }

        /* 列表区域 */
        .list-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            -webkit-overflow-scrolling: touch;
        }

        /* 卡片样式 */
        .item-card {
            background: var(--card-bg);
            border-radius: 14px;
            padding: 15px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.04);
            animation: slideIn 0.3s ease-out;
        }

        .link-card { border-left: 4px solid var(--primary-clr); }

        .link-text {
            color: var(--primary-clr);
            text-decoration: none;
            word-break: break-all;
            font-size: 15px;
            font-weight: 600;
            display: block;
        }

        .plain-text {
            margin: 0;
            color: var(--text-main);
            font-size: 15px;
            line-height: 1.4;
            white-space: pre-wrap;
        }

        /* 备注样式 */
        .comment-box {
            margin-top: 10px;
            padding-top: 8px;
            border-top: 1px dashed #eee;
            font-size: 13px;
            color: var(--comment-clr);
            line-height: 1.4;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            margin-top: 12px;
            font-size: 11px;
            color: var(--text-sec);
        }

        .copy-tag { cursor: pointer; color: var(--primary-clr); font-weight: 500; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (min-width: 600px) {
            .header-input, .list-container { width: 500px; margin: 0 auto; }
        }
    </style>
</head>
<body>

<div class="header-input">
    <textarea id="mainInput" placeholder="这里：粘贴链接&#10;这里：备注信息..."></textarea>
    <div class="action-bar">
        <span class="id-label" id="idDisplay">ID: ...</span>
        <button onclick="saveItem()" class="save-btn">保存</button>
    </div>
</div>

<div id="listContainer" class="list-container"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, push, query, limitToLast, onChildAdded, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDQwjomxjLURd0nWmS0RuhkaecXISqALzs",
        authDomain: "cloze-master-pro.firebaseapp.com",
        databaseURL: "https://cloze-master-pro-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "cloze-master-pro",
        storageBucket: "cloze-master-pro.firebasestorage.app",
        messagingSenderId: "697808901954",
        appId: "1:697808901954:web:32455d94bf67e522e01adb"
    };

    const fbApp = initializeApp(firebaseConfig);
    const db = getDatabase(fbApp);

    window.getDocId = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const customId = urlParams.get('customid');
        return customId ? "cid_" + customId.trim() : "default_collection";
    }

    const inputArea = document.getElementById('mainInput');
    const listEl = document.getElementById('listContainer');
    const docId = window.getDocId();
    const idLabel = document.getElementById('idDisplay');

    // --- 诊断功能：监听连接状态 ---
    const connectedRef = ref(db, ".info/connected");
    onValue(connectedRef, (snap) => {
        if (snap.val() === true) {
            idLabel.innerText = "● 已连接 ID: " + docId;
            idLabel.style.color = "green";
        } else {
            idLabel.innerText = "○ 连接中/断开... ID: " + docId;
            idLabel.style.color = "red";
        }
    });

    window.saveItem = async function() {
        const rawText = inputArea.value.trim();
        if (!rawText) return;

        const lines = rawText.split('\n');
        const firstLine = lines[0].trim();
        const comment = lines.slice(1).join('\n').trim();

        try {
            const collectionRef = ref(db, 'collections/' + docId);
            const newItemRef = push(collectionRef);
            
            console.log("正在尝试提交到:", 'collections/' + docId);
            
            await set(newItemRef, {
                content: firstLine,
                comment: comment,
                timestamp: Date.now()
            });
            
            inputArea.value = "";
            inputArea.focus();
        } catch (e) { 
            alert("保存失败！请检查 Firebase Rules 是否设为 true。\n错误代码: " + e.message); 
            console.error(e);
        }
    }

    inputArea.addEventListener('keydown', (e) => {
        if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') saveItem();
    });

    // 监听逻辑
    const collectionQuery = query(ref(db, 'collections/' + docId), limitToLast(40));
    onChildAdded(collectionQuery, (snapshot) => {
        renderCard(snapshot.val());
    });

    function renderCard(data) {
        if (!data || !data.content) return;
        const isLink = /^https?:\/\/[^\s]+/.test(data.content.trim());
        const time = new Date(data.timestamp).toLocaleString([], { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        
        const div = document.createElement('div');
        div.className = 'item-card' + (isLink ? ' link-card' : '');
        
        const mainHtml = isLink 
            ? `<a href="${data.content}" target="_blank" class="link-text">${data.content}</a>`
            : `<p class="plain-text">${data.content}</p>`;

        const commentHtml = data.comment 
            ? `<div class="comment-box">备注：${data.comment}</div>` 
            : '';

        div.innerHTML = `
            ${mainHtml}
            ${commentHtml}
            <div class="card-footer">
                <span>${time}</span>
                <span class="copy-tag" onclick="copyText(this, \`${data.content.replace(/`/g, '\\`').replace(/\$/g, '\\$')}\`)">复制链接</span>
            </div>
        `;
        listEl.insertBefore(div, listEl.firstChild);
    }

    window.copyText = async (el, text) => {
        try {
            await navigator.clipboard.writeText(text);
            const old = el.innerText;
            el.innerText = "已复制";
            setTimeout(() => el.innerText = old, 1000);
        } catch (err) {}
    };
    </script>
</body>
</html>
