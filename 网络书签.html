<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sticky Sync - 极简收藏</title>
    <style>
        :root {
            --primary-clr: #007aff;
            --bg-clr: #f2f2f7;
            --card-bg: #ffffff;
            --text-main: #1c1c1e;
            --text-sec: #8e8e93;
            --comment-clr: #636366;
            --danger-clr: #ff3b30;
            --border-clr: #d1d1d6;
        }

        /* 自动适配深色模式 */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-clr: #000000;
                --card-bg: #1c1c1e;
                --text-main: #ffffff;
                --text-sec: #8e8e93;
                --comment-clr: #aeaeb2;
                --border-clr: #38383a;
            }
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-clr);
            font-family: -apple-system, system-ui, sans-serif;
            display: flex; flex-direction: column;
            height: 100vh; overflow: hidden;
            color: var(--text-main);
        }

        /* 顶部输入区 */
        .header-input {
            background: var(--card-bg);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 15px 15px 10px 15px;
            border-bottom: 1px solid var(--border-clr);
            z-index: 100; flex-shrink: 0;
        }

        #mainInput {
            width: 100%; height: 85px;
            padding: 12px; border: 1px solid var(--border-clr);
            border-radius: 12px; font-size: 16px;
            resize: none; outline: none; 
            background: var(--bg-clr); color: var(--text-main);
        }

        .action-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .id-label { font-size: 11px; font-family: monospace; font-weight: bold; }
        .save-btn { background: var(--primary-clr); color: white; border: none; padding: 8px 24px; border-radius: 20px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
        .save-btn:active { opacity: 0.7; }

        /* 列表区域 */
        .list-container {
            flex: 1; overflow-y: auto;
            padding: 15px; display: flex; flex-direction: column; gap: 12px;
            -webkit-overflow-scrolling: touch;
        }

        .item-card {
            background: var(--card-bg); border-radius: 14px;
            padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            position: relative; animation: slideIn 0.3s ease-out;
        }
        
        .link-card { border-left: 4px solid var(--primary-clr); }

        /* Logo & Title 布局 */
        .link-header { display: flex; align-items: flex-start; gap: 12px; }
        .site-logo {
            width: 36px; height: 36px; border-radius: 8px;
            background: #f0f0f5; object-fit: contain; padding: 3px; flex-shrink: 0;
        }
        
        .link-content { flex: 1; min-width: 0; }
        .link-text { 
            color: var(--primary-clr); text-decoration: none; 
            font-size: 16px; font-weight: 700; line-height: 1.3;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }
        .link-url-sub { font-size: 11px; color: var(--text-sec); word-break: break-all; margin-top: 4px; display: block; }

        .plain-text { margin: 0; color: var(--text-main); font-size: 15px; white-space: pre-wrap; cursor: pointer; margin-right: 20px; }
        .comment-box { margin-top: 10px; padding: 10px; background: rgba(142, 142, 147, 0.1); border-radius: 10px; font-size: 13px; color: var(--comment-clr); cursor: pointer; line-height: 1.4; }
        
        .card-footer { display: flex; justify-content: space-between; margin-top: 12px; font-size: 11px; color: var(--text-sec); }
        .copy-tag { cursor: pointer; color: var(--primary-clr); font-weight: 600; padding: 5px; }

        /* 删除按钮 */
        .del-btn {
            position: absolute; top: 10px; right: 10px;
            width: 24px; height: 24px; color: var(--text-sec);
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; cursor: pointer; z-index: 5;
        }

        /* 编辑弹窗 */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center;
            backdrop-filter: blur(5px);
        }
        .modal-content { background: var(--card-bg); width: 90%; max-width: 400px; padding: 20px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .modal-content h3 { margin: 0 0 15px 0; font-size: 18px; text-align: center; }
        .modal-content textarea { 
            width: 100%; height: 150px; margin-bottom: 20px; padding: 12px; 
            border-radius: 12px; border: 1px solid var(--border-clr); font-size: 15px;
            background: var(--bg-clr); color: var(--text-main); outline: none;
        }
        .modal-btns { display: flex; gap: 12px; }
        .modal-btns button { flex: 1; padding: 14px; border-radius: 14px; border: none; font-weight: bold; cursor: pointer; font-size: 15px; }
        .btn-save { background: var(--primary-clr); color: white; }
        .btn-cancel { background: var(--border-clr); color: var(--text-main); }

        @keyframes slideIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @media (min-width: 600px) { .header-input, .list-container { width: 500px; margin: 0 auto; } }
    </style>
</head>
<body>

<div class="header-input">
    <textarea id="mainInput" placeholder="粘贴链接或输入文字内容...&#10;换行可添加备注说明"></textarea>
    <div class="action-bar">
        <span class="id-label" id="idDisplay">同步状态中...</span>
        <button onclick="saveItem()" class="save-btn">保存收藏</button>
    </div>
</div>

<div id="listContainer" class="list-container"></div>

<div id="editModal" class="modal">
    <div class="modal-content">
        <h3>编辑收藏</h3>
        <textarea id="editInput"></textarea>
        <div class="modal-btns">
            <button class="btn-cancel" onclick="closeEdit()">取消</button>
            <button class="btn-save" id="confirmEditBtn">更新并保存</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, push, query, limitToLast, onChildAdded, onChildChanged, onChildRemoved, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDQwjomxjLURd0nWmS0RuhkaecXISqALzs",
        authDomain: "cloze-master-pro.firebaseapp.com",
        databaseURL: "https://cloze-master-pro-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "cloze-master-pro",
        storageBucket: "cloze-master-pro.firebasestorage.app",
        messagingSenderId: "697808901954",
        appId: "1:697808901954:web:32455d94bf67e522e01adb"
    };

    const fbApp = initializeApp(firebaseConfig);
    const db = getDatabase(fbApp);

    const docId = (new URLSearchParams(window.location.search)).get('customid') ? "cid_" + (new URLSearchParams(window.location.search)).get('customid').trim() : "default_collection";
    const inputArea = document.getElementById('mainInput');
    const listEl = document.getElementById('listContainer');
    const idLabel = document.getElementById('idDisplay');

    // 状态连接监听
    onValue(ref(db, ".info/connected"), (snap) => {
        idLabel.innerText = (snap.val() === true ? "● 已连接: " : "○ 离线: ") + docId;
        idLabel.style.color = snap.val() === true ? "#34c759" : "#ff3b30";
    });

    // 核心保存逻辑（包含标题抓取）
    window.saveItem = async function() {
        const rawText = inputArea.value.trim();
        if (!rawText) return;
        
        const lines = rawText.split('\n');
        const content = lines[0].trim();
        const comment = lines.slice(1).join('\n').trim();
        const isLink = /^https?:\/\/[^\s]+/.test(content);
        
        let displayTitle = content;
        inputArea.value = ""; // 立即清空增加反馈感
        
        if (isLink) {
            idLabel.innerText = "⏳ 正在解析网页标题...";
            try {
                // 方案 A: 使用 allorigins 的 https 强制链接
                const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(content)}`);
                const json = await res.json();
                
                if (json.contents) {
                    const doc = new DOMParser().parseFromString(json.contents, 'text/html');
                    // 增加对不同标题标签的兼容性
                    const webTitle = doc.querySelector('title')?.innerText || 
                                     doc.querySelector('meta[property="og:title"]')?.content;
                    if (webTitle) displayTitle = webTitle.trim();
                }
            } catch (e) { 
    console.error("抓取详细错误:", e);
    idLabel.innerText = "❌ 抓取失败 (CORS或网络限制)"; 
}
        }

        await push(ref(db, `collections/${docId}`), {
            title: displayTitle,
            content: content,
            comment: comment,
            timestamp: Date.now()
        });
        idLabel.innerText = "● 已连接: " + docId;
    }

    // 实时监听数据库变化
    const collectionRef = ref(db, `collections/${docId}`);
    onChildAdded(query(collectionRef, limitToLast(50)), (snap) => {
        const card = createCardElement(snap.key, snap.val());
        listEl.insertBefore(card, listEl.firstChild);
    });

    onChildChanged(collectionRef, (snap) => {
        const oldCard = document.getElementById(snap.key);
        if (oldCard) listEl.replaceChild(createCardElement(snap.key, snap.val()), oldCard);
    });

    onChildRemoved(collectionRef, (snap) => document.getElementById(snap.key)?.remove());

    // 生成卡片
    function createCardElement(key, data) {
        const isLink = /^https?:\/\/[^\s]+/.test(data.content);
        const div = document.createElement('div');
        div.id = key;
        div.className = 'item-card' + (isLink ? ' link-card' : '');
        const time = new Date(data.timestamp).toLocaleString([], { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' });

        let logoHtml = '';
        if (isLink) {
            try {
                const domain = new URL(data.content).hostname;
                logoHtml = `<img class="site-logo" src="https://icons.duckduckgo.com/ip3/${domain}.ico" onerror="this.src='https://www.google.com/s2/favicons?domain=${domain}&sz=64'">`;
            } catch(e) {}
        }

        div.innerHTML = `
            <div class="del-btn" onclick="deleteItem('${key}')">×</div>
            <div class="link-header">
                ${isLink ? logoHtml : ''}
                <div class="link-content">
                    ${isLink 
                        ? `<a href="${data.content}" target="_blank" class="link-text">${data.title || data.content}</a>
                           <span class="link-url-sub">${data.content}</span>` 
                        : `<p class="plain-text" onclick="openEdit('${key}', \`${data.content.replace(/`/g,'\\`').replace(/\$/g,'\\$')}\`, \`${(data.comment||'').replace(/`/g,'\\`').replace(/\$/g,'\\$')}\`)">${data.content}</p>`
                    }
                </div>
            </div>
            ${data.comment ? `<div class="comment-box" onclick="openEdit('${key}', \`${data.content.replace(/`/g,'\\`').replace(/\$/g,'\\$')}\`, \`${data.comment.replace(/`/g,'\\`').replace(/\$/g,'\\$')}\`)">${data.comment}</div>` : ''}
            <div class="card-footer">
                <span>${time}</span>
                <span class="copy-tag" onclick="copyText(this, \`${data.content}\`)">复制内容</span>
            </div>
        `;
        return div;
    }

    // 操作函数：删除
    window.deleteItem = (key) => { if (confirm("确定删除这条书签吗？")) remove(ref(db, `collections/${docId}/${key}`)); };

    // 操作函数：编辑
    let currentEditKey = null;
    window.openEdit = (key, content, comment) => {
        currentEditKey = key;
        document.getElementById('editInput').value = content + (comment ? '\n' + comment : '');
        document.getElementById('editModal').style.display = 'flex';
    };
    window.closeEdit = () => { document.getElementById('editModal').style.display = 'none'; };

    document.getElementById('confirmEditBtn').onclick = async () => {
        const text = document.getElementById('editInput').value.trim();
        if (!text || !currentEditKey) return;
        const lines = text.split('\n');
        await update(ref(db, `collections/${docId}/${currentEditKey}`), {
            content: lines[0].trim(),
            comment: lines.slice(1).join('\n').trim()
        });
        closeEdit();
    };

    // 复制功能
    window.copyText = async (el, text) => {
        await navigator.clipboard.writeText(text);
        const old = el.innerText; el.innerText = "已复制";
        setTimeout(() => el.innerText = old, 1000);
    };

    // 快捷键保存
    inputArea.addEventListener('keydown', (e) => { if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') saveItem(); });
</script>
</body>
</html>
