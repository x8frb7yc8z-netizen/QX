<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sticky Sync - 极简收藏</title>
    <style>
        :root {
            --primary-clr: #007aff;
            --bg-clr: #f2f2f7;
            --card-bg: #ffffff;
            --text-main: #1c1c1e;
            --text-sec: #8e8e93;
            --comment-clr: #636366;
            --danger-clr: #ff3b30;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-clr);
            font-family: -apple-system, system-ui, sans-serif;
            display: flex; flex-direction: column;
            height: 100vh; overflow: hidden;
        }

        /* 顶部输入区 */
        .header-input {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 15px 15px 10px 15px;
            border-bottom: 1px solid #d1d1d6;
            z-index: 100; flex-shrink: 0;
        }

        #mainInput {
            width: 100%; height: 80px;
            padding: 12px; border: 1px solid #d1d1d6;
            border-radius: 12px; font-size: 16px;
            resize: none; outline: none; background: #fff;
        }

        .action-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .id-label { font-size: 11px; font-family: monospace; font-weight: bold; }
        .save-btn { background: var(--primary-clr); color: white; border: none; padding: 8px 24px; border-radius: 20px; font-weight: 600; cursor: pointer; }

        /* 列表区域 */
        .list-container {
            flex: 1; overflow-y: auto;
            padding: 15px; display: flex; flex-direction: column; gap: 12px;
            -webkit-overflow-scrolling: touch;
        }

        .item-card {
            background: var(--card-bg); border-radius: 14px;
            padding: 15px; box-shadow: 0 2px 6px rgba(0,0,0,0.04);
            position: relative; animation: slideIn 0.3s ease-out;
        }
        
        .link-card { border-left: 4px solid var(--primary-clr); }
        .link-text { color: var(--primary-clr); text-decoration: none; word-break: break-all; font-size: 15px; font-weight: 600; display: block; margin-right: 25px; }
        .plain-text { margin: 0; color: var(--text-main); font-size: 15px; white-space: pre-wrap; cursor: pointer; margin-right: 25px; }
        .comment-box { margin-top: 10px; padding: 8px; background: #f8f8fa; border-radius: 8px; font-size: 13px; color: var(--comment-clr); cursor: pointer; }
        
        .card-footer { display: flex; justify-content: space-between; margin-top: 12px; font-size: 11px; color: var(--text-sec); }
        .copy-tag { cursor: pointer; color: var(--primary-clr); font-weight: 500; }

        /* 删除按钮 */
        .del-btn {
            position: absolute; top: 10px; right: 10px;
            width: 24px; height: 24px; color: #ccc;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; cursor: pointer;
        }
        .del-btn:hover { color: var(--danger-clr); }

        /* 编辑弹窗 */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-content { background: white; width: 90%; max-width: 400px; padding: 20px; border-radius: 20px; }
        .modal-content textarea { width: 100%; height: 120px; margin: 15px 0; padding: 10px; border-radius: 10px; border: 1px solid #ddd; font-size: 15px; }
        .modal-btns { display: flex; gap: 10px; }
        .modal-btns button { flex: 1; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
        .btn-save { background: var(--primary-clr); color: white; }
        .btn-cancel { background: #eee; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @media (min-width: 600px) { .header-input, .list-container { width: 500px; margin: 0 auto; } }
    </style>
</head>
<body>

<div class="header-input">
    <textarea id="mainInput" placeholder="第一行：内容&#10;后面行：备注信息..."></textarea>
    <div class="action-bar">
        <span class="id-label" id="idDisplay">连接中...</span>
        <button onclick="saveItem()" class="save-btn">保存</button>
    </div>
</div>

<div id="listContainer" class="list-container"></div>

<div id="editModal" class="modal">
    <div class="modal-content">
        <h3 style="margin:0">编辑收藏</h3>
        <textarea id="editInput"></textarea>
        <div class="modal-btns">
            <button class="btn-cancel" onclick="closeEdit()">取消</button>
            <button class="btn-save" id="confirmEditBtn">保存</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, push, query, limitToLast, onChildAdded, onChildChanged, onChildRemoved, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDQwjomxjLURd0nWmS0RuhkaecXISqALzs",
        authDomain: "cloze-master-pro.firebaseapp.com",
        databaseURL: "https://cloze-master-pro-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "cloze-master-pro",
        storageBucket: "cloze-master-pro.firebasestorage.app",
        messagingSenderId: "697808901954",
        appId: "1:697808901954:web:32455d94bf67e522e01adb"
    };

    const fbApp = initializeApp(firebaseConfig);
    const db = getDatabase(fbApp);

    const urlParams = new URLSearchParams(window.location.search);
    const docId = urlParams.get('customid') ? "cid_" + urlParams.get('customid').trim() : "default_collection";
    
    const inputArea = document.getElementById('mainInput');
    const listEl = document.getElementById('listContainer');
    const idLabel = document.getElementById('idDisplay');

    // 连接状态
    onValue(ref(db, ".info/connected"), (snap) => {
        idLabel.innerText = (snap.val() === true ? "● 已连接 ID: " : "○ 断开 ID: ") + docId;
        idLabel.style.color = snap.val() === true ? "green" : "red";
    });

    // 保存新项
    window.saveItem = async function() {
        const text = inputArea.value.trim();
        if (!text) return;
        const lines = text.split('\n');
        await push(ref(db, `collections/${docId}`), {
            content: lines[0].trim(),
            comment: lines.slice(1).join('\n').trim(),
            timestamp: Date.now()
        });
        inputArea.value = "";
    }

    // --- 实时监听逻辑 ---
    const collectionRef = ref(db, `collections/${docId}`);

    // 处理新增
    onChildAdded(query(collectionRef, limitToLast(50)), (snap) => {
        const card = createCardElement(snap.key, snap.val());
        listEl.insertBefore(card, listEl.firstChild);
    });

    // 处理修改
    onChildChanged(collectionRef, (snap) => {
        const oldCard = document.getElementById(snap.key);
        if (oldCard) {
            const newCard = createCardElement(snap.key, snap.val());
            listEl.replaceChild(newCard, oldCard);
        }
    });

    // 处理删除
    onChildRemoved(collectionRef, (snap) => {
        document.getElementById(snap.key)?.remove();
    });

    // 生成卡片 DOM
    function createCardElement(key, data) {
        const isLink = /^https?:\/\/[^\s]+/.test(data.content);
        const div = document.createElement('div');
        div.id = key;
        div.className = 'item-card' + (isLink ? ' link-card' : '');
        const time = new Date(data.timestamp).toLocaleString([], { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' });

        div.innerHTML = `
            <div class="del-btn" onclick="deleteItem('${key}')">×</div>
            ${isLink ? `<a href="${data.content}" target="_blank" class="link-text">${data.content}</a>` : `<p class="plain-text" onclick="openEdit('${key}', \`${data.content.replace(/`/g,'\\`').replace(/\$/g,'\\$')}\`, \`${(data.comment||'').replace(/`/g,'\\`').replace(/\$/g,'\\$')}\`)">${data.content}</p>`}
            ${data.comment ? `<div class="comment-box" onclick="openEdit('${key}', \`${data.content.replace(/`/g,'\\`').replace(/\$/g,'\\$')}\`, \`${data.comment.replace(/`/g,'\\`').replace(/\$/g,'\\$')}\`)">${data.comment}</div>` : ''}
            <div class="card-footer">
                <span>${time}</span>
                <span class="copy-tag" onclick="copyText(this, \`${data.content}\`)">复制内容</span>
            </div>
        `;
        return div;
    }

    // 删除函数
    window.deleteItem = (key) => {
        if (confirm("确定删除这条书签吗？")) {
            remove(ref(db, `collections/${docId}/${key}`));
        }
    };

    // 编辑弹窗函数
    let currentEditKey = null;
    window.openEdit = (key, content, comment) => {
        currentEditKey = key;
        document.getElementById('editInput').value = content + (comment ? '\n' + comment : '');
        document.getElementById('editModal').style.display = 'flex';
    };

    window.closeEdit = () => { document.getElementById('editModal').style.display = 'none'; };

    document.getElementById('confirmEditBtn').onclick = async () => {
        const text = document.getElementById('editInput').value.trim();
        if (!text || !currentEditKey) return;
        const lines = text.split('\n');
        await update(ref(db, `collections/${docId}/${currentEditKey}`), {
            content: lines[0].trim(),
            comment: lines.slice(1).join('\n').trim()
        });
        closeEdit();
    };

    window.copyText = async (el, text) => {
        await navigator.clipboard.writeText(text);
        const old = el.innerText; el.innerText = "已复制";
        setTimeout(() => el.innerText = old, 1000);
    };

    inputArea.addEventListener('keydown', (e) => { if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') saveItem(); });
</script>
</body>
</html>
